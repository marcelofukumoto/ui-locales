typeDescription:
  # Map of
  # type: Description to be shown on the top of list view describing the type.
  #       Should fit on one line.
  #       If you link to anything external, it MUST have
  #       target="_blank" rel="noopener noreferrer nofollow"
  jwt.authentication: Habilitar esta funcionalidade em um cluster para adicionar suporte à autenticação JWT para contas de serviço downstream.
  branding: O Branding permite que administradores re-marquem globalmente a interface, personalizando o nome do produto Rancher, logotipos e esquema de cores.
  chart: Todos os charts têm pelo menos uma versão instalável em clusters com nós Linux e Windows, salvo indicação em contrário.
  compliance.cattle.io.clusterscanbenchmark: Uma versão de benchmark é o nome do benchmark a ser executado usando o kube-bench, bem como os parâmetros de configuração válidos para esse benchmark.
  compliance.cattle.io.clusterscanprofile: Um perfil é a configuração para a verificação de conformidade, que inclui as versões de benchmark a usar e quaisquer testes específicos a ignorar nesse benchmark.
  compliance.cattle.io.clusterscan: Uma verificação é criada para acionar uma verificação de conformidade no cluster com base no perfil definido. Um relatório é criado após a conclusão da verificação.
  compliance.cattle.io.clusterscanreport: Um relatório é o resultado de uma verificação de conformidade do cluster.
  management.cattle.io.feature: Flags de funcionalidades permitem que determinadas funcionalidades do {vendor} sejam ativadas e desativadas. Funcionalidades desativadas por padrão devem ser consideradas funcionalidade experimental.
  cluster.x-k8s.io.machine: Uma Machine encapsula a configuração de um Nó Kubernetes. Use esta visualização para ver o que acontece após atualizar um cluster.
  cluster.x-k8s.io.machinedeployment: Um Machine Deployment orquestra implantações por meio de templates em uma coleção de Machine Sets (semelhante a um Deployment). Use esta visualização para ver o que acontece após atualizar um cluster.
  cluster.x-k8s.io.machineset: Um Machine Set garante que o número desejado de recursos Machine esteja em execução o tempo todo (semelhante a um ReplicaSet). Use esta visualização para ver o que acontece após atualizar um cluster.
  resources.cattle.io.backup: Um backup é criado para realizar backups pontuais ou agendar backups recorrentes com base em um ResourceSet.
  resources.cattle.io.restore: Um restore é criado para acionar uma restauração no cluster com base em um arquivo de backup.
  resources.cattle.io.resourceset: Um resource set define quais CRDs e recursos armazenar no backup.
  monitoring.coreos.com.servicemonitor: Um monitor de serviço define o grupo de serviços e os endpoints que o Prometheus coletará para métricas. Esta é a forma mais comum de definir a coleta de métricas.
  monitoring.coreos.com.podmonitor: Um monitor de pod define o grupo de pods que o Prometheus coletará para métricas. A forma comum é usar monitores de serviço, mas monitores de pod permitem lidar com qualquer situação em que um monitor de serviço não funcionaria.
  monitoring.coreos.com.prometheusrule: Um recurso de Regra Prometheus define regras de gravação e/ou alerta. Uma regra de gravação pode pré-computar valores e salvar os resultados. Regras de alerta permitem definir condições para quando enviar notificações ao AlertManager.
  monitoring.coreos.com.prometheus: Um servidor Prometheus é uma implantação Prometheus cuja configuração de coleta e regras são determinadas pelos ServiceMonitors, PodMonitors e PrometheusRules selecionados, e cujos alertas serão enviados a todos os Alertmanagers selecionados com a configuração do recurso personalizado.
  monitoring.coreos.com.alertmanager: Um gerenciador de alertas é uma implantação cuja configuração será especificada por um secret no mesmo namespace, o que determina quais alertas devem ir para qual receptor.
  node: O recurso base do Nó Kubernetes representa uma máquina virtual ou física que hospeda implantações. Para gerenciar o ciclo de vida da máquina, se disponível, vá para Gerenciamento de Cluster.
  catalog.cattle.io.clusterrepo: 'Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis no cluster.'
  catalog.cattle.io.clusterrepo.local: ' Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis no cluster. Os Templates de Cluster são implantados via charts Helm.'
  catalog.cattle.io.operation: Uma operação é a lista de operações Helm recentes que foram aplicadas ao cluster.
  catalog.cattle.io.app: Um aplicativo instalado é um chart Helm 3 que foi instalado por nossos charts ou pela CLI do Helm.
  logging.banzaicloud.io.clusterflow: Os logs do cluster serão coletados e enviados para o Cluster Output selecionado.
  logging.banzaicloud.io.clusteroutput: Um output de cluster define para quais provedores de log os logs podem ser enviados e só é eficaz quando implantado no namespace em que o operador de log está.
  logging.banzaicloud.io.flow: Um flow define quais logs coletar e filtrar, bem como para qual output enviar os logs. O flow é um recurso com namespace, o que significa que os logs só serão coletados do namespace em que o flow está implantado.
  logging.banzaicloud.io.output: Um output define para quais provedores de log os logs podem ser enviados. O output precisa estar no mesmo namespace que o flow que o utiliza.
  group.principal: Atribuir funções globais a um grupo só funciona com provedores de autenticação externos que suportam grupos. A autorização local não suporta grupos.
  management.cattle.io.oidcclient: Aqui você pode adicionar aplicativos ao provedor de identidade de single sign-on do Rancher
  auditlog.cattle.io.auditpolicy: Defina regras que determinam quais eventos da API Rancher são registrados e o nível de detalhe que contêm.

