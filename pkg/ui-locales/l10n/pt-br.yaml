advancedSettings:
  setEnv: Definido por variável de ambiente
  hideShow: Ocultar/mostrar configuração
  label: Configurações
  subtext: Usuários comuns não precisarão alterar essas configurações. Prossiga com cautela, valores incorretos podem quebrar sua instalação do {appName}. As configurações que foram personalizadas em relação às configurações padrão são marcadas como 'Modificadas'.
  show: Mostrar
  hide: Ocultar
  none: Nenhum
  modified: Modificado
  edit:
    moreActions: Mais ações para configuração - { setting }
    label: Editar Setting
    changeSetting: 'Alterar configuração:'
    agentConfigBanner: 
      text: Editar este valor não alterará o valor definido nos clusters em execução! Para atualizar um cluster em execução para usar os novos valores, edite o cluster e clique em "Aplicar configurações globais para Classe de prioridade e Orçamento de interrupção de pods" na aba de configuração do agente {agent}.
      cluster: Cluster
      fleet: Fleet
    trueOption: "Verdadeiro"
    falseOption: "Falso"
    value: Valor
    useDefault: Usar o valor padrão
    invalidJSON: JSON inválido - verifique e corrija sua entrada antes de salvar
  descriptions:
    'cacerts': 'Certificados CA necessários para verificar o certificado do servidor.'
    'password-min-length': 'Define o número mínimo de caracteres necessários para uma senha de usuário.'
    'cluster-defaults': 'Substitui os padrões do RKE ao criar novos clusters.'
    'engine-install-url': 'URL padrão de instalação do Docker Engine (para a maioria dos drivers de nó).'
    'engine-iso-url': 'URL padrão de instalação do SO (para o driver vSphere).'
    'engine-newest-version': 'A versão mais recente com suporte do Docker no momento deste lançamento. Uma versão do Docker que não satisfaz o intervalo suportado, mas é mais recente, será marcada como não testada.'
    'engine-supported-range': 'Intervalo semver para versões do Docker Engine com suporte. As versões que não satisfazem este intervalo serão marcadas como sem suporte na UI.'
    'ingress-ip-domain': 'Domínio DNS curinga a ser usado para nomes de host Ingress gerados automaticamente. <ingress-name>.<namespace-name>.<endereço IP do controlador de ingress> será adicionado ao domínio.'
    'server-url': 'URL de instalação padrão do {appName}. Deve ser HTTPS. Todos os nós do cluster devem conseguir alcançar este endereço.'
    'system-default-registry': 'Registro privado a ser usado para todas as imagens de container do sistema Rancher. Se nenhum valor for especificado, o registro padrão do runtime de container é usado. Para Docker e containerd, o padrão é `docker.io`.'
    'ui-index': 'Localização do índice HTML para a UI do Gerenciador de cluster.'
    'ui-dashboard-index': 'Localização do índice HTML para a UI do {appName}.'
    'ui-offline-preferred': 'Controla se os ativos da UI são servidos localmente pelo container do servidor ou a partir da URL remota definida nas configurações ui-index e ui-dashboard-index. A opção `Dinâmico` usará ativos locais em builds de produção do {appName}.'
    'ui-pl': 'Nome da empresa com etiqueta privada.'
    'auth-user-info-max-age-seconds': 'A idade máxima dos tokens de autenticação de um usuário antes de uma sincronização de membros de grupo do provedor de autenticação ser realizada.'
    'auth-user-info-resync-cron': 'Agendamento cron padrão para ressincronizar associações de grupo do provedor de autenticação.'
    'cluster-template-enforcement': 'Não administradores serão restritos a iniciar clusters somente via Modelos RKE pré-aprovados.'
    'auth-user-session-idle-ttl-minutes': 'TTL de inatividade personalizado (em minutos) em uma sessão de autenticação do usuário. Esta é a duração máxima que uma sessão pode permanecer ativa quando não há atividade do usuário no navegador. Deve ser menor que "auth-user-session-ttl-minutes". Se "auth-user-session-idle-ttl-minutes" for maior ou igual a "auth-user-session-ttl-minutes", o recurso de sessão inativa é considerado desabilitado.'
    'auth-user-session-ttl-minutes': 'TTL personalizado (em minutos) em uma sessão de autenticação do usuário. Esta é a duração máxima que uma sessão pode permanecer ativa independentemente da atividade do usuário no navegador. Deve ser maior que "auth-user-session-idle-ttl-minutes".'
    'auth-token-max-ttl-minutes': 'TTL máximo (em minutos) para todos os tokens, exceto os controlados por "auth-user-session-ttl-minutes" (tokens de sessão do usuário). Quando definido como 0, o token nunca expira.'
    'kubeconfig-generate-token': 'Gerar tokens automaticamente para usuários quando um kubeconfig é solicitado.'
    'kubeconfig-default-token-ttl-minutes': 'TTL (em minutos) aplicado a todos os tokens de kubeconfig. Quando definido como 0, o token nunca expira.'
    'rke-metadata-config': 'Configurar parâmetros de atualização de metadados do RKE.'
    'ui-banners': 'O banner de classificação é usado para exibir um banner fixo personalizado no cabeçalho, rodapé ou ambos.'
    'custom-notifications': 'Editar notificações personalizadas'
    'ui-consent-banner': 'O banner é usado para exibir um banner de consentimento personalizado apresentado aos usuários durante o login.'
    'ui-default-landing': 'A página padrão na qual os usuários chegam após o login.'
    'brand': 'Nome da pasta para um tema alternativo definido em "/assets/brand"'
    'hide-local-cluster': 'Ocultar o cluster local'
    'agent-tls-mode': 'Verificação de certificado Rancher. No modo strict, os agentes confiarão apenas em instalações do Rancher que usam um certificado assinado pelo CABundle na configuração cacerts.'
    'k3s-based-upgrader-uninstall-concurrency': 'Define o número máximo de clusters nos quais o Rancher pode desinstalar simultaneamente o app legado `rancher-k3s-upgrader` ou `rancher-rke2-upgrader` de clusters K3s ou RKE2 importados ou com driver de nó.'
    'system-agent-upgrader-install-concurrency': 'Define o número máximo de clusters nos quais o Rancher pode instalar simultaneamente os recursos necessários para atualizar o system-agent.'
    'imported-cluster-version-management': 'Habilita o gerenciamento de versão para clusters RKE2/K3s importados e o cluster local se for um cluster RKE2/K3s. A configuração de gerenciamento de versão por cluster substitui esta configuração global no nível do cluster. Para clusters existentes onde o gerenciamento de versão no nível do cluster está definido como "system-default", alterar este sinalizador acionará uma reimplantação do agente do cluster durante a próxima reconciliação (por padrão a cada 5 minutos, ou assim que o cluster for editado, o que ocorrer primeiro).'
  warnings:
    'agent-tls-mode': 'Alterar esta configuração fará com que todos os agentes sejam reimplantados.'
  editHelp:
    'ui-banners': 'Esta configuração recebe um objeto JSON com 3 parâmetros raiz: <code>banner</code>, <code>showHeader</code>, <code>showFooter</code>. <code>banner</code> é um objeto contendo: <code>textColor</code>, <code>background</code> e <code>text</code>, onde <code>textColor</code> e <code>background</code> são qualquer valor de cor CSS válido.'
  enum:
    'ui-default-landing':
      ember: Cluster Manager
      vue: Explorer do cluster
    'ui-offline-preferred':
      dynamic: Dinâmico
      true: Local
      false: Remoto
    'harv-ui-source':
      auto: 'Auto'
      bundled: 'Bundled'
      external: 'Externo'
    'harv-log-level':
      info: Informação
      debug: Debug
      trace: Trace
    'agent-tls-mode':
      strict: 'Strict'
      system-store: 'System Store'
  provisioning:
    header: Provisionamento de Cluster

featureFlags:
